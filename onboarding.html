<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OMA — ONBOARDING</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--char:#080808;--carbon:#0f0f0f;--iron:#1e1e1e;--ash:#555;--bone:#e0d9cf;--fire:#e8703a;--gold:#c8a456;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--char);color:var(--bone);font-family:'Barlow',sans-serif;min-height:100vh;}
.hdr{background:var(--carbon);border-bottom:1px solid var(--iron);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hback{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);text-decoration:none;letter-spacing:1px;}
.hback:hover{color:var(--fire);}
.htitle{font-family:'Black Ops One',cursive;font-size:18px;letter-spacing:2px;color:var(--fire);}
.zero-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:40px;text-align:center;}
.zero-icon{font-size:64px;margin-bottom:24px;opacity:.4;}
.zero-title{font-family:'Black Ops One',cursive;font-size:28px;letter-spacing:3px;color:var(--ash);margin-bottom:12px;}
.zero-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);letter-spacing:2px;line-height:2;margin-bottom:32px;}
.zero-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);border:1px solid var(--gold);padding:6px 16px;border-radius:2px;}
.zero-items{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:720px;margin-top:48px;}
@media(max-width:600px){.zero-items{grid-template-columns:1fr;}}
.zero-item{background:var(--carbon);border:1px solid var(--iron);border-radius:4px;padding:24px;}
.zero-item-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ash);text-transform:uppercase;margin-bottom:10px;}
.zero-item-val{font-family:'Black Ops One',cursive;font-size:32px;color:var(--iron);}
</style>
</head>
<body>
<header class="hdr">
  <a href="/hub" class="hback">HUB</a>
  <span class="htitle">ONBOARDING</span>
  <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--ash)">AGUARDANDO DADOS</span>
</header>
<div class="zero-wrap">
  <div class="zero-icon">🚀</div>
  <div class="zero-title">ZERADO</div>
  <div class="zero-sub">Painel de onboarding aguardando primeiro cliente.<br>Cada novo cliente aparecera aqui com<br>status de cada etapa do processo.</div>
  <span class="zero-badge">PRONTO PARA COMECAR A MEDIR</span>
  <div class="zero-items"><div class="zero-item"><div class="zero-item-lbl">Em Onboarding</div><div class="zero-item-val">0</div></div><div class="zero-item"><div class="zero-item-lbl">Concluidos</div><div class="zero-item-val">0</div></div><div class="zero-item"><div class="zero-item-lbl">Tempo Medio</div><div class="zero-item-val">—</div></div></div>
</div>
</body>
</html>
