<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMA — Auditoria & Diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#111;--border:#222;--ash:#555;--fog:#777;--bone:#e0d9cf;--fire:#e8703a;--green:#3d9e60;--yellow:#f5a623;--red:#e24b4a;--blue:#378add}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--bone);font-family:Barlow,sans-serif;min-height:100vh;padding:24px;max-width:1100px;margin:0 auto}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px}
.title span{color:var(--fire)}
.updated{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);letter-spacing:1px}

/* Score card */
.score-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;flex:1;min-width:140px}
.score-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--ash);text-transform:uppercase;margin-bottom:6px}
.score-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px}
.score-val.g{color:var(--green)}.score-val.y{color:var(--yellow)}.score-val.r{color:var(--red)}
.score-sub{font-size:11px;color:var(--ash);margin-top:4px}

/* Category */
.cat{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.cat-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border)}
.cat-header:hover{background:rgba(232,112,58,.03)}
.cat-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.cat-score{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;padding:4px 10px;border-radius:4px}
.cat-score.g{background:rgba(61,158,96,.12);color:var(--green)}
.cat-score.y{background:rgba(245,166,35,.12);color:var(--yellow)}
.cat-score.r{background:rgba(226,75,74,.12);color:var(--red)}
.cat-body{padding:0}

/* Item row */
.item{display:grid;grid-template-columns:32px 1fr 70px 1fr 90px;gap:12px;align-items:start;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.item:last-child{border-bottom:none}
.item:hover{background:rgba(255,255,255,.02)}
@media(max-width:800px){.item{grid-template-columns:32px 1fr;gap:6px}.item .hide-m{display:none}}

.farol{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.farol.g{background:rgba(61,158,96,.15);color:var(--green)}
.farol.y{background:rgba(245,166,35,.15);color:var(--yellow)}
.farol.r{background:rgba(226,75,74,.15);color:var(--red)}

.item-main{display:flex;flex-direction:column;gap:3px}
.item-title{font-weight:600;font-size:13px}
.item-current{font-size:11px;color:var(--fog);line-height:1.5}

.item-risk{font-size:11px;color:var(--ash);line-height:1.5}

.item-action{display:flex;flex-direction:column;gap:3px}
.action-text{font-size:11px;color:var(--fog);line-height:1.5}
.action-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px}
.action-tag.planned{background:rgba(55,138,221,.12);color:var(--blue)}
.action-tag.urgent{background:rgba(226,75,74,.12);color:var(--red)}
.action-tag.done{background:rgba(61,158,96,.12);color:var(--green)}
.action-tag.progress{background:rgba(245,166,35,.12);color:var(--yellow)}

.item-nota{font-family:'Space Mono',monospace;font-size:11px;text-align:center}
.nota-num{font-weight:700;font-size:16px;display:block}

/* Legend */
.legend{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;font-size:11px;color:var(--ash)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:3px}
.legend-dot.g{background:rgba(61,158,96,.2)}.legend-dot.y{background:rgba(245,166,35,.2)}.legend-dot.r{background:rgba(226,75,74,.2)}
</style>
</head>
<body>

<div class="header">
  <div class="title">AUDITORIA & <span>DIAGNÓSTICO</span></div>
  <div class="updated" id="updated"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot g"></div> Adequado (8-10)</div>
  <div class="legend-item"><div class="legend-dot y"></div> Atenção (5-7)</div>
  <div class="legend-item"><div class="legend-dot r"></div> Crítico (0-4)</div>
  <div style="margin-left:auto;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px">CRITÉRIO · ESTADO ATUAL · NOTA · RISCO · AÇÃO</div>
</div>

<div class="score-bar" id="scores"></div>

<div id="audit-body"></div>

// Calculate scores
function calcScores() {
  var total = 0, count = 0;
  var catScores = [];
  AUDIT.forEach(function(cat) {
    var catTotal = 0;
    cat.items.forEach(function(item) { catTotal += item.nota; total += item.nota; count++; });
    var avg = catTotal / cat.items.length;
    catScores.push({ name: cat.cat, avg: avg, farol: avg >= 8 ? 'g' : avg >= 5 ? 'y' : 'r' });
  });
  var overall = total / count;
  return { overall: overall, cats: catScores, total: count };
}

function render() {
  document.getElementById('updated').textContent = 'Atualizado: ' + new Date().toLocaleString('pt-BR');

  var sc = calcScores();

  // Score cards
  var sFarol = sc.overall >= 8 ? 'g' : sc.overall >= 5 ? 'y' : 'r';
  var greens = 0, yellows = 0, reds = 0;
  AUDIT.forEach(function(cat) { cat.items.forEach(function(i) {
    if (i.farol === 'g') greens++; else if (i.farol === 'y') yellows++; else reds++;
  }); });

  document.getElementById('scores').innerHTML =
    '<div class="score-card"><div class="score-label">NOTA GERAL</div><div class="score-val ' + sFarol + '">' + sc.overall.toFixed(1) + '</div><div class="score-sub">de 10.0 · ' + sc.total + ' critérios</div></div>' +
    '<div class="score-card"><div class="score-label">ADEQUADOS</div><div class="score-val g">' + greens + '</div><div class="score-sub">nota 8-10</div></div>' +
    '<div class="score-card"><div class="score-label">ATENÇÃO</div><div class="score-val y">' + yellows + '</div><div class="score-sub">nota 5-7</div></div>' +
    '<div class="score-card"><div class="score-label">CRÍTICOS</div><div class="score-val r">' + reds + '</div><div class="score-sub">nota 0-4</div></div>';

  // Categories
  var html = '';
  AUDIT.forEach(function(cat, ci) {
    var catSc = sc.cats[ci];
    html += '<div class="cat">';
    html += '<div class="cat-header" onclick="toggleCat(' + ci + ')">';
    html += '<div class="cat-title">' + cat.cat + '</div>';
    html += '<span class="cat-score ' + catSc.farol + '">' + catSc.avg.toFixed(1) + '/10</span>';
    html += '</div>';
    html += '<div class="cat-body" id="cat-' + ci + '">';

    cat.items.forEach(function(item) {
      var tagClass = item.tag || 'planned';
      var tagLabel = { done: 'CONCLUÍDO', urgent: 'URGENTE', planned: 'PLANEJADO', progress: 'EM ANDAMENTO' }[tagClass] || tagClass.toUpperCase();
      html += '<div class="item">';
      html += '<div class="farol ' + item.farol + '">' + item.nota + '</div>';
      html += '<div class="item-main"><div class="item-title">' + item.title + '</div><div class="item-current">' + item.current + '</div></div>';
      html += '<div class="item-nota hide-m"><div class="nota-num" style="color:var(--' + (item.farol === 'g' ? 'green' : item.farol === 'y' ? 'yellow' : 'red') + ')">' + item.nota + '/10</div></div>';
      html += '<div class="item-risk hide-m"><strong style="font-size:10px;color:var(--ash)">RISCO:</strong><br>' + item.risk + '</div>';
      html += '<div class="item-action hide-m"><span class="action-tag ' + tagClass + '">' + tagLabel + '</span> ' + (item.prazo !== '—' ? item.prazo : '') + '<div class="action-text" style="margin-top:4px">' + item.action + '</div></div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('audit-body').innerHTML = html;
}

function toggleCat(i) {
  var el = document.getElementById('cat-' + i);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

render();
</script>
</body>
</html>
