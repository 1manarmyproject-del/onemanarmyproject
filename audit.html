<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMA — Auditoria & Diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#111;--border:#222;--ash:#555;--fog:#777;--bone:#e0d9cf;--fire:#e8703a;--green:#3d9e60;--yellow:#f5a623;--red:#e24b4a;--blue:#378add}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--bone);font-family:Barlow,sans-serif;min-height:100vh;padding:24px;max-width:1100px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px}.title span{color:var(--fire)}
.updated{font-family:'Space Mono',monospace;font-size:10px;color:var(--ash);letter-spacing:1px}
.auto-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;background:rgba(61,158,96,.1);color:var(--green);letter-spacing:1px;margin-left:8px}
.legend{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;font-size:11px;color:var(--ash)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:3px}
.legend-dot.g{background:rgba(61,158,96,.2)}.legend-dot.y{background:rgba(245,166,35,.2)}.legend-dot.r{background:rgba(226,75,74,.2)}
.score-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px}
.score-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--ash);text-transform:uppercase;margin-bottom:4px}
.score-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px}
.score-val.g{color:var(--green)}.score-val.y{color:var(--yellow)}.score-val.r{color:var(--red)}
.score-sub{font-size:10px;color:var(--ash);margin-top:3px}
.cat{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.cat-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.cat-header:hover{background:rgba(232,112,58,.03)}
.cat-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px}
.cat-right{display:flex;align-items:center;gap:8px}
.cat-score{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;padding:3px 10px;border-radius:4px}
.cat-score.g{background:rgba(61,158,96,.12);color:var(--green)}.cat-score.y{background:rgba(245,166,35,.12);color:var(--yellow)}.cat-score.r{background:rgba(226,75,74,.12);color:var(--red)}
.cat-auto{font-family:'Space Mono',monospace;font-size:8px;color:var(--ash);letter-spacing:1px}
.cat-body{padding:0}
.item{display:grid;grid-template-columns:30px 1fr 60px;gap:10px;align-items:start;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;transition:background .1s}
.item:last-child{border-bottom:none}
.item:hover{background:rgba(255,255,255,.015)}
.item.expanded{background:rgba(255,255,255,.02)}
.farol{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.farol.g{background:rgba(61,158,96,.15);color:var(--green)}.farol.y{background:rgba(245,166,35,.15);color:var(--yellow)}.farol.r{background:rgba(226,75,74,.15);color:var(--red)}
.item-main{cursor:pointer}.item-title{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.item-title .auto-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0}
.item-current{font-size:11px;color:var(--fog);margin-top:3px;line-height:1.5}
.item-nota{font-family:'Space Mono',monospace;font-size:11px;text-align:center}
.nota-num{font-weight:700;font-size:15px;display:block}
.item-detail{display:none;grid-column:1/-1;padding:10px 18px 14px;background:rgba(255,255,255,.015);border-top:1px solid rgba(255,255,255,.04)}
.item-detail.show{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:11px}
.detail-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--ash);text-transform:uppercase;margin-bottom:3px}
.detail-text{color:var(--fog);line-height:1.5}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px}
.tag.done{background:rgba(61,158,96,.12);color:var(--green)}.tag.urgent{background:rgba(226,75,74,.12);color:var(--red)}.tag.planned{background:rgba(55,138,221,.12);color:var(--blue)}.tag.progress{background:rgba(245,166,35,.12);color:var(--yellow)}
@media(max-width:600px){.score-bar{flex-wrap:wrap}.score-card{min-width:45%}.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div><div class="title">AUDITORIA & <span>DIAGNÓSTICO</span></div></div>
  <div><span class="updated" id="updated">Carregando...</span><span class="auto-badge">AUTO-CHECK A CADA 15MIN</span></div>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot g"></div> Adequado (8-10)</div>
  <div class="legend-item"><div class="legend-dot y"></div> Atenção (5-7)</div>
  <div class="legend-item"><div class="legend-dot r"></div> Crítico (0-4)</div>
  <div class="legend-item" style="margin-left:auto"><div style="width:6px;height:6px;border-radius:50%;background:var(--blue)"></div> Check automático</div>
</div>
<div class="score-bar" id="scores"></div>
<div id="audit-body"></div>
<script>
// ── AUTH ─────────────────────────────────────────────────
function getToken(){var t=localStorage.getItem('oma_hub_token')||sessionStorage.getItem('oma_hub_token');var e=parseInt(localStorage.getItem('oma_hub_token_exp')||'0');if(!t||Date.now()>e)return null;return t;}
function getAuthHeaders(){var t=getToken();return t?{'Authorization':'Bearer '+t,'Content-Type':'application/json'}:{'Content-Type':'application/json'};}
function _omaShow(){['ls','login-screen','login'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});['app','main','content'].forEach(function(id){var el=document.getElementById(id);if(el){el.style.display='block';el.style.opacity='1';}});}
function _omaLoad(){_omaShow();if(typeof init==='function')init();else if(typeof load==='function')load();else if(typeof loadData==='function')loadData();else if(typeof render==='function')render();}
window.addEventListener('message',function(e){if(!e.data||e.data.type!=='oma_auth')return;var tok=e.data.token||e.data.oma_api_key||'';if(tok){localStorage.setItem('oma_hub_token',tok);localStorage.setItem('oma_hub_token_exp',String(Date.now()+28800000));}  _omaLoad();});
document.addEventListener('DOMContentLoaded',function(){if(getToken())_omaLoad();});
function init(){if(typeof _omaLoad==='function')_omaLoad();}
function farol(n){return n>=8?'g':n>=5?'y':'r'}
function tagLabel(t){return{done:'CONCLUÍDO',urgent:'URGENTE',planned:'PLANEJADO',progress:'EM ANDAMENTO'}[t]||t.toUpperCase()}

function render(data){
  document.getElementById('updated').textContent='Atualizado: '+data.updated_at_brt;
  var allItems=[];data.categories.forEach(function(c){allItems=allItems.concat(c.items);});
  var total=allItems.reduce(function(s,i){return s+i.nota;},0);
  var avg=total/allItems.length;
  var greens=allItems.filter(function(i){return i.nota>=8;}).length;
  var yellows=allItems.filter(function(i){return i.nota>=5&&i.nota<8;}).length;
  var reds=allItems.filter(function(i){return i.nota<5;}).length;
  var autos=allItems.filter(function(i){return i.auto;}).length;
  
  document.getElementById('scores').innerHTML=
    '<div class="score-card"><div class="score-label">NOTA GERAL</div><div class="score-val '+farol(avg)+'">'+avg.toFixed(1)+'</div><div class="score-sub">de 10.0 · '+allItems.length+' critérios</div></div>'+
    '<div class="score-card"><div class="score-label">ADEQUADOS</div><div class="score-val g">'+greens+'</div><div class="score-sub">nota 8-10</div></div>'+
    '<div class="score-card"><div class="score-label">ATENÇÃO</div><div class="score-val y">'+yellows+'</div><div class="score-sub">nota 5-7</div></div>'+
    '<div class="score-card"><div class="score-label">CRÍTICOS</div><div class="score-val r">'+reds+'</div><div class="score-sub">nota 0-4</div></div>'+
    '<div class="score-card"><div class="score-label">AUTO-CHECKS</div><div class="score-val" style="color:var(--blue)">'+autos+'</div><div class="score-sub">de '+allItems.length+' total</div></div>';

  var html='';
  data.categories.forEach(function(cat,ci){
    var catAvg=cat.items.reduce(function(s,i){return s+i.nota;},0)/cat.items.length;
    var catAutos=cat.items.filter(function(i){return i.auto;}).length;
    html+='<div class="cat"><div class="cat-header" onclick="toggleCat('+ci+')">';
    html+='<div class="cat-title">'+cat.cat+'</div>';
    html+='<div class="cat-right">';
    if(catAutos)html+='<span class="cat-auto">'+catAutos+' auto</span>';
    html+='<span class="cat-score '+farol(catAvg)+'">'+catAvg.toFixed(1)+'/10</span></div></div>';
    html+='<div class="cat-body" id="cat-'+ci+'">';
    cat.items.forEach(function(item,ii){
      var uid=ci+'-'+ii;
      html+='<div class="item" id="item-'+uid+'">';
      html+='<div class="farol '+item.farol+'">'+item.nota+'</div>';
      html+='<div class="item-main" onclick="toggleItem(\''+uid+'\')">';
      html+='<div class="item-title">'+(item.auto?'<span class="auto-dot"></span>':'')+item.title+'</div>';
      html+='<div class="item-current">'+item.current+'</div></div>';
      html+='<div class="item-nota"><span class="nota-num" style="color:var(--'+(item.farol==='g'?'green':item.farol==='y'?'yellow':'red')+')">'+item.nota+'</span>/10</div>';
      html+='</div>';
      html+='<div class="item-detail" id="detail-'+uid+'">';
      html+='<div class="detail-grid">';
      html+='<div><div class="detail-label">RISCO</div><div class="detail-text">'+item.risk+'</div></div>';
      html+='<div><div class="detail-label">AÇÃO</div><div class="detail-text"><span class="tag '+item.tag+'">'+tagLabel(item.tag)+'</span> '+(item.prazo!=='—'?item.prazo:'')+'<br>'+item.action+'</div></div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('audit-body').innerHTML=html;
}

function toggleCat(i){var e=document.getElementById('cat-'+i);e.style.display=e.style.display==='none'?'block':'none';}
function toggleItem(uid){
  var d=document.getElementById('detail-'+uid);
  var item=document.getElementById('item-'+uid);
  var show=!d.classList.contains('show');
  document.querySelectorAll('.item-detail').forEach(function(el){el.classList.remove('show');});
  document.querySelectorAll('.item').forEach(function(el){el.classList.remove('expanded');});
  if(show){d.classList.add('show');item.classList.add('expanded');}
}

// Fetch data and render
fetch('/audit-data.json?t='+Date.now())
  .then(function(r){return r.json();})
  .then(render)
  .catch(function(e){document.getElementById('updated').textContent='Erro ao carregar dados';});

// Auto-refresh every 5 min
setInterval(function(){
  fetch('/audit-data.json?t='+Date.now()).then(function(r){return r.json();}).then(render).catch(function(){});
},300000);
</script>
</body>
</html>
