<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMA Academy — Entrar</title>
<link rel="icon" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--fire:#e8703a;--ember:#c05020;--bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1e1e1e;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#aaa;--text3:#555;--green:#4ade80;--red:#f87171;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:400;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;position:relative;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,112,58,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;animation:up .4s ease both;}
.logo{text-align:center;margin-bottom:36px;}
.logo-mark{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--fire);margin-bottom:10px;}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:2px;color:var(--text);text-transform:uppercase;}
.logo-name span{color:var(--fire);}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-family:'Space Mono',monospace;}
.card{background:var(--bg2);border:1px solid var(--border);padding:36px 32px;}
@media(max-width:420px){.card{padding:28px 20px;}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab.active{color:var(--fire);border-color:var(--fire);}
.tab:hover:not(.active){color:var(--text2);}
.social-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.btn-social{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:'Barlow',sans-serif;font-weight:500;font-size:14px;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s,background .2s;}
.btn-social:hover{border-color:var(--text3);color:var(--text);background:var(--bg4);}
.btn-social svg{width:18px;height:18px;flex-shrink:0;}
.or{display:flex;align-items:center;gap:12px;margin:20px 0;font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--border);}
.form-group{margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:380px){.form-row{grid-template-columns:1fr;}}
label{display:block;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0;}
input:focus{border-color:var(--fire);}
input::placeholder{color:var(--text3);}
.btn-fire{width:100%;padding:15px;background:var(--fire);color:#080808;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .1s;margin-top:4px;}
.btn-fire:hover{background:var(--ember);}
.btn-fire:active{transform:scale(.98);}
.btn-fire:disabled{opacity:.5;cursor:not-allowed;}
.magic-note{font-size:12px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.6;}
.magic-note a{color:var(--fire);text-decoration:none;cursor:pointer;}
.msg{padding:12px 14px;font-size:13px;margin-top:14px;border-left:3px solid;display:none;}
.msg.ok{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.06);}
.msg.err{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.06);}
.msg.show{display:block;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(8,8,8,.3);border-top-color:#080808;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.back{text-align:center;margin-top:20px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text3);}
.back a{color:var(--text2);text-decoration:none;}
.back a:hover{color:var(--fire);}
.url-error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--red);display:none;}
.url-error.show{display:block;}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">One Man Army Project</div>
    <div class="logo-name">OMA <span>Academy</span></div>
    <div class="logo-sub">Trilha de domínio técnico</div>
  </div>
  <div class="url-error" id="urlError"></div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register')">Criar conta</div>
    </div>
    <div class="social-btns">
      <a class="btn-social" href="https://api.onemanarmyproject.com.br/academy/auth/google">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuar com Google
      </a>
      <a class="btn-social" href="https://api.onemanarmyproject.com.br/academy/auth/facebook">
        <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073c0 6.027 4.388 11.024 10.125 11.927v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.514c-1.491 0-1.956.927-1.956 1.874v2.25h3.328l-.532 3.49h-2.796v8.437C19.612 23.097 24 18.1 24 12.073z"/></svg>
        Continuar com Facebook
      </a>
    </div>
    <div class="or">ou</div>
    <div id="panelLogin">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Senha</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-fire" id="btnLogin" onclick="doLogin()">Entrar</button>
      <div class="msg" id="loginMsg"></div>
      <div class="magic-note" style="margin-top:18px">Esqueceu a senha? <a onclick="switchTab('magic')">Receber link por email</a></div>
    </div>
    <div id="panelRegister" style="display:none">
      <div class="form-row">
        <div class="form-group"><label>Nome *</label><input type="text" id="regNome" placeholder="Seu nome" autocomplete="name"></div>
        <div class="form-group"><label>Empresa</label><input type="text" id="regEmpresa" placeholder="OMA Project"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email *</label><input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Cargo</label><input type="text" id="regCargo" placeholder="Founder"></div>
      </div>
      <div class="form-group"><label>Senha *</label><input type="password" id="regPass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <button class="btn-fire" id="btnRegister" onclick="doRegister()">Criar conta e entrar</button>
      <div class="msg" id="registerMsg"></div>
    </div>
    <div id="panelMagic" style="display:none">
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px">Informe seu email e enviaremos um link de acesso direto. Sem precisar lembrar senha.</div>
      <div class="form-group"><label>Nome (primeiro acesso)</label><input type="text" id="magicNome" placeholder="Seu nome"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="magicEmail" placeholder="seu@email.com"></div>
      <button class="btn-fire" id="btnMagic" onclick="doMagic()">Enviar link de acesso</button>
      <div class="msg" id="magicMsg"></div>
    </div>
  </div>
  <div class="back"><a href="/">&#8592; Voltar para o site</a></div>
</div>
<script>
const API='https://api.onemanarmyproject.com.br';
const params=new URLSearchParams(location.search);
const urlErr=params.get('error');
if(urlErr){const msgs={token_expired:'Link expirado. Solicite um novo.',token_missing:'Link inválido.',google_failed:'Falha no Google. Tente novamente.',google_cancelled:'Login com Google cancelado.',fb_failed:'Falha no Facebook. Tente novamente.',fb_cancelled:'Login com Facebook cancelado.'};const el=document.getElementById('urlError');el.textContent=msgs[urlErr]||'Ocorreu um erro. Tente novamente.';el.classList.add('show');}
const tokenParam=params.get('token');
if(tokenParam){localStorage.setItem('oma_academy_token',tokenParam);location.replace('/academy');}
const existingToken=localStorage.getItem('oma_academy_token');
if(existingToken){fetch(API+'/academy/me',{headers:{Authorization:'Bearer '+existingToken}}).then(r=>r.ok?location.replace('/academy'):null).catch(()=>{});}
function switchTab(tab){['login','register','magic'].forEach(t=>{const p=document.getElementById('panel'+t[0].toUpperCase()+t.slice(1));if(p)p.style.display='none';const tb=document.getElementById('tab'+t[0].toUpperCase()+t.slice(1));if(tb)tb.classList.remove('active');});const p=document.getElementById('panel'+tab[0].toUpperCase()+tab.slice(1));if(p)p.style.display='block';const tb=document.getElementById('tab'+tab[0].toUpperCase()+tab.slice(1));if(tb)tb.classList.add('active');}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type+' show';}
async function doLogin(){const email=document.getElementById('loginEmail').value.trim();const password=document.getElementById('loginPass').value;if(!email||!password)return showMsg('loginMsg','Preencha email e senha.','err');const btn=document.getElementById('btnLogin');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';try{const r=await fetch(API+'/academy/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await r.json();if(!r.ok){showMsg('loginMsg',data.error==='credenciais invalidas'?'Email ou senha incorretos.':data.error,'err');}else{localStorage.setItem('oma_academy_token',data.token);localStorage.setItem('oma_academy_user',JSON.stringify(data.user));showMsg('loginMsg','Bem-vindo! Redirecionando...','ok');setTimeout(()=>location.replace('/academy'),800);}}catch{showMsg('loginMsg','Erro de conexão.','err');}finally{btn.disabled=false;btn.textContent='Entrar';}}
async function doRegister(){const nome=document.getElementById('regNome').value.trim();const email=document.getElementById('regEmail').value.trim();const empresa=document.getElementById('regEmpresa').value.trim();const cargo=document.getElementById('regCargo').value.trim();const password=document.getElementById('regPass').value;if(!nome||!email||!password)return showMsg('registerMsg','Nome, email e senha obrigatórios.','err');if(password.length<6)return showMsg('registerMsg','Senha com mínimo 6 caracteres.','err');const btn=document.getElementById('btnRegister');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';try{const r=await fetch(API+'/academy/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,empresa,cargo,password})});const data=await r.json();if(!r.ok){showMsg('registerMsg',data.error==='email_exists'?'Email já cadastrado.':data.error,'err');}else{localStorage.setItem('oma_academy_token',data.token);localStorage.setItem('oma_academy_user',JSON.stringify(data.user));showMsg('registerMsg','Conta criada! Redirecionando...','ok');setTimeout(()=>location.replace('/academy'),800);}}catch{showMsg('registerMsg','Erro de conexão.','err');}finally{btn.disabled=false;btn.textContent='Criar conta e entrar';}}
async function doMagic(){const nome=document.getElementById('magicNome').value.trim();const email=document.getElementById('magicEmail').value.trim();if(!email)return showMsg('magicMsg','Email obrigatório.','err');const btn=document.getElementById('btnMagic');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';try{const r=await fetch(API+'/academy/magic-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,nome})});const data=await r.json();if(!r.ok){showMsg('magicMsg',data.error==='nome obrigatorio para novo cadastro'?'Primeiro acesso: informe seu nome também.':data.error,'err');}else{showMsg('magicMsg','Link enviado para '+email+'. Verifique sua caixa de entrada.','ok');document.getElementById('btnMagic').style.display='none';}}catch{showMsg('magicMsg','Erro de conexão.','err');}finally{if(btn.style.display!=='none'){btn.disabled=false;btn.textContent='Enviar link de acesso';}}}
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('panelLogin').style.display!=='none')doLogin();else if(document.getElementById('panelRegister').style.display!=='none')doRegister();else if(document.getElementById('panelMagic').style.display!=='none')doMagic();});
</script>
</body>
</html>
