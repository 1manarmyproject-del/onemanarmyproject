let tab='all', activeJid=null;

function dL(){const v=document.getElementById('pw').value;if(v===PWD||v==='omaproject2026'){['oma_monitor','oma_hub','oma_auth','ops'].forEach(k=>localStorage.setItem(k,'1'));document.getElementById('ls').style.display='none';document.getElementById('app').style.display='flex';init();}else{document.getElementById('le').style.display='block';document.getElementById('pw').value='';}}
function lo(){['oma_monitor','oma_hub','oma_auth','ops'].forEach(k=>localStorage.removeItem(k));location.reload();}
function tick(){document.getElementById('ck').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(tick,1000);tick();

function fmtPhone(p){const d=p.replace(/\D/g,'');if(d.length===13)return'+'+d.slice(0,2)+' ('+d.slice(2,4)+') '+d.slice(4,9)+'-'+d.slice(9);if(d.length===12)return'+'+d.slice(0,2)+' ('+d.slice(2,4)+') '+d.slice(4,8)+'-'+d.slice(8);return p;}
function fmtTime(ts){if(!ts)return'--';const d=new Date(ts);const n=new Date();const today=d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();return today?d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\\n/g,'<br>');}

function renderList(q=''){
  const f=q.toLowerCase();
  const filtered=CONVS.filter(c=>{
    if(tab==='bia'&&c.agent!=='bia')return false;
    if(tab==='amanda'&&c.agent!=='amanda')return false;
    if(f&&!c.phone.includes(f)&&!fmtPhone(c.phone).includes(f))return false;
    return true;
  });
  const el=document.getElementById('cl');
  if(!filtered.length){el.innerHTML='<div class="conv-empty">Nenhuma conversa</div>';return;}
  el.innerHTML=filtered.map(c=>`<div class="conv-item ${c.jid===activeJid?'active':''}" onclick="openConv('${c.jid}')">
    <div class="conv-agent ${c.agent}">${c.agent.toUpperCase()}</div>
    <div class="conv-name">${fmtPhone(c.phone)}</div>
    <div class="conv-preview">${c.total} msgs · ${c.bot} respostas do agente</div>
    <div class="conv-time">${fmtTime(c.ts)}</div>
  </div>`).join('');
}

function openConv(jid){
  activeJid=jid;
  const c=CONVS.find(x=>x.jid===jid);
  if(!c)return;
  renderList(document.getElementById('si').value);
  const msgs=MSGS[jid]||[];
  const panel=document.getElementById('cp');
  panel.innerHTML=`<div class="chat-hdr">
    <div><div class="chat-contact">${fmtPhone(c.phone)}</div><div class="chat-meta">${c.phone} · ${c.total} msgs</div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="chat-tag tag-${c.agent}">${c.agent.toUpperCase()}</span>
      <button class="inst-btn" onclick="openInst('${jid}')">✏️ INSTRUIR AGENTE</button>
    </div>
  </div>
  <div class="chat-body" id="cb">${renderMsgs(msgs,c.agent)}</div>`;
  const cb=document.getElementById('cb');
  if(cb)cb.scrollTop=cb.scrollHeight;
}

function renderMsgs(msgs, agent){
  let lastDate='', out='';
  for(const m of msgs){
    const d=new Date(m.ts);
    const ds=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
    if(ds!==lastDate){out+=`<div class="msg-date-sep">${ds.toUpperCase()}</div>`;lastDate=ds;}
    const cls=m.isBot?'bot':'user';
    const name=m.isBot?agent.toUpperCase():(m.sender||'Contato');
    const time=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    out+=`<div class="msg ${cls}"><div class="msg-bubble">${escHtml(m.content)}</div><div class="msg-meta"><span class="msg-sender">${name}</span><span class="msg-time">${time}</span></div></div>`;
  }
  return out||'<div class="placeholder"><div class="placeholder-sub">Sem mensagens</div></div>';
}

function sT(t,el){tab=t;document.querySelectorAll('.ntab').forEach(n=>n.classList.remove('ac'));el.classList.add('ac');renderList(document.getElementById('si').value);}
function filt(q){renderList(q);}

let instJid = null;

function openInst(jid) {
  instJid = jid;
  const c = CONVS.find(x => x.jid === jid);
  if (!c) return;
  const agent = c.agent === 'bia' ? 'Bia' : 'Amanda';
  const phone = fmtPhone(c.phone);
  const lastMsg = (MSGS[jid] || []).slice(-1)[0];
  const lastContent = lastMsg ? lastMsg.content.slice(0, 80) : 'sem mensagens';
  document.getElementById('instCtx').innerHTML =
    '[INSTRUÇÃO OPERACIONAL — ' + agent.toUpperCase() + ']
' +
    'Cliente: ' + phone + '
' +
    'Conversa: WhatsApp · ' + c.total + ' msgs · agente ' + agent + '
' +
    'Última mensagem: "' + lastContent + (lastContent.length >= 80 ? '...' : '') + '"';
  document.getElementById('instTa').value = '';
  document.getElementById('instSend').disabled = false;
  document.getElementById('instOverlay').classList.add('open');
  setTimeout(() => document.getElementById('instTa').focus(), 100);
}

function closeInst() {
  document.getElementById('instOverlay').classList.remove('open');
  instJid = null;
}

async function sendInst() {
  const instrucao = document.getElementById('instTa').value.trim();
  if (!instrucao) { toast('Digite uma instrução'); return; }
  const c = CONVS.find(x => x.jid === instJid);
  if (!c) return;
  const agent = c.agent === 'bia' ? 'Bia' : 'Amanda';
  const phone = fmtPhone(c.phone);
  const lastMsg = (MSGS[instJid] || []).slice(-1)[0];
  const lastContent = lastMsg ? lastMsg.content.slice(0, 120) : '';
  const msg = '[INSTRUÇÃO OPERACIONAL — ' + agent.toUpperCase() + ']
'
    + 'Cliente: ' + phone + ' (' + instJid.replace(/@s.whatsapp.net/, '') + ')
'
    + 'Última mensagem do cliente: "' + lastContent + '"

'
    + 'Instrução: ' + instrucao;
  const btn = document.getElementById('instSend');
  btn.disabled = true;
  btn.textContent = 'ENVIANDO...';
  try {
    const res = await fetch('https://api.telegram.org/bot8799149983:AAG6AsWEW-P9j25cIwgVGtoWdsNpgjr9zcs/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: '8392126681', text: msg })
    });
    const r = await res.json();
    if (r.ok) {
      toast('✅ Instrução enviada ao George!', 'ok');
      closeInst();
    } else {
      toast('❌ Erro ao enviar', 'err');
      btn.disabled = false;
      btn.textContent = 'ENVIAR AO GEORGE';
    }
  } catch(e) {
    toast('❌ Erro de conexão', 'err');
    btn.disabled = false;
    btn.textContent = 'ENVIAR AO GEORGE';
  }
}

document.getElementById('instOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('instOverlay')) closeInst();
});
