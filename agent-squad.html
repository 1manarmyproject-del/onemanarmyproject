<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Squad - One Man Army Project</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141414;--iron:#1e1e1e;--border:#2a2a2a;--fire:#e8703a;--bone:#e4ddd3;--ash:#666;--white:#f5f0e8;--green:#3d9e60;--yellow:#f5a623;--red:#e24b4a;--blood:#7a2204;--blue:#378add}
body{background:var(--bg);color:var(--bone);font-family:Barlow,sans-serif;font-size:14px;min-height:100vh}
header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;color:var(--bone)}
.logo span{color:var(--fire)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:Space Mono,monospace;font-size:10px;color:var(--ash);letter-spacing:1px}
.stat strong{color:var(--bone);font-size:15px;display:block;margin-bottom:1px}
.pct-bar{flex:1;min-width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pct-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.pct-label{font-family:Space Mono,monospace;font-size:10px;color:var(--green);letter-spacing:1px;white-space:nowrap}
.toolbar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:10px;font-family:Space Mono,monospace;color:var(--ash);cursor:pointer;letter-spacing:1px;transition:all .15s}
.filter.active{background:var(--fire);border-color:var(--fire);color:#000}
.filter:hover:not(.active){border-color:var(--fire);color:var(--fire)}
.tbr{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:10px;font-family:Space Mono,monospace;color:var(--ash);cursor:pointer;letter-spacing:1px;transition:all .15s}
.btn:hover{border-color:var(--fire);color:var(--fire)}
.btn.primary{background:var(--fire);border-color:var(--fire);color:#000}
.board{display:grid;grid-template-columns:repeat(7,minmax(165px,1fr));gap:10px;padding:14px 20px;align-items:start;overflow-x:auto}
.col{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;min-height:280px;transition:outline .1s}
.col.drag-over{outline:2px dashed var(--fire);outline-offset:-2px}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.col-label{font-family:Space Mono,monospace;font-size:8px;letter-spacing:2px;padding:3px 9px;border-radius:20px;font-weight:700}
.lbl-back{background:rgba(102,102,102,.15);color:var(--ash);border:1px solid rgba(102,102,102,.3)}
.lbl-todo{background:rgba(245,166,35,.15);color:var(--yellow);border:1px solid rgba(245,166,35,.3)}
.lbl-doing{background:rgba(232,112,58,.15);color:var(--fire);border:1px solid rgba(232,112,58,.3)}
.lbl-review{background:rgba(175,169,236,.15);color:#afa9ec;border:1px solid rgba(175,169,236,.3)}
.lbl-approved{background:rgba(55,138,221,.15);color:var(--blue);border:1px solid rgba(55,138,221,.3)}
.lbl-done{background:rgba(61,158,96,.15);color:var(--green);border:1px solid rgba(61,158,96,.3)}
.col-count{font-family:Space Mono,monospace;font-size:10px;color:var(--ash)}
.card{background:var(--iron);border:1px solid var(--border);border-radius:8px;padding:9px 10px;margin-bottom:7px;cursor:grab;transition:border-color .15s}
.card:hover{border-color:var(--ash)}
.card.dragging{opacity:.25;cursor:grabbing}
.card.prio-alta{border-left:3px solid var(--red)}
.card.prio-media{border-left:3px solid var(--yellow)}
.card.prio-baixa{border-left:3px solid var(--ash)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-family:Space Mono,monospace;font-size:8px;padding:2px 6px;border-radius:10px;letter-spacing:.5px;border:1px solid}
.badge-area{background:rgba(122,34,4,.15);color:#c86060;border-color:rgba(122,34,4,.3)}
.resp-fabio{background:rgba(232,112,58,.15);color:var(--fire);border:1px solid rgba(232,112,58,.3)}
.resp-george{background:rgba(55,138,221,.15);color:var(--blue);border:1px solid rgba(55,138,221,.3)}
.resp-flavia{background:rgba(212,83,126,.15);color:#d4537e;border:1px solid rgba(212,83,126,.3)}
.resp-bia{background:rgba(61,158,96,.15);color:var(--green);border:1px solid rgba(61,158,96,.3)}
.resp-tiago{background:rgba(175,169,236,.15);color:#afa9ec;border:1px solid rgba(175,169,236,.3)}
.resp-darwin{background:rgba(245,166,35,.15);color:var(--yellow);border:1px solid rgba(245,166,35,.3)}
.prio-btn{font-family:Space Mono,monospace;font-size:8px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--ash);cursor:pointer;background:none;white-space:nowrap}
.prio-btn.alta{color:var(--red);border-color:rgba(226,75,74,.3)}
.prio-btn.media{color:var(--yellow);border-color:rgba(245,166,35,.3)}
.card-text{font-size:12px;color:var(--bone);line-height:1.4;margin-bottom:6px}
.card-tags{border-top:1px solid rgba(255,255,255,.06);padding-top:5px;margin-top:4px;margin-bottom:5px}
.tag-line{display:flex;gap:4px;align-items:center;font-family:'Space Mono',monospace;font-size:8px;line-height:1.9;color:var(--ash)}
.tag-time{color:var(--ash);min-width:42px;flex-shrink:0}
.tag-agent{font-weight:700;min-width:38px;flex-shrink:0}
.tag-action{min-width:48px;flex-shrink:0}
.tag-detail{color:var(--fog);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.card-actions{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ca{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:9px;font-family:Space Mono,monospace;color:var(--ash);cursor:pointer;letter-spacing:.5px;transition:all .15s}
.ca:hover{border-color:var(--fire);color:var(--fire)}
.ca.g:hover{border-color:var(--green);color:var(--green)}
.ca.r:hover{border-color:var(--red);color:var(--red)}
.mv{background:none;border:none;padding:2px 5px;font-size:12px;color:var(--ash);cursor:pointer}
.mv:hover{color:var(--fire)}
.mv-grp{display:flex;margin-left:auto}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:420px;max-width:94vw;max-height:85vh;overflow-y:auto}
.modal h3{font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:18px;color:var(--white);margin-bottom:14px}
.modal label{display:block;font-family:Space Mono,monospace;font-size:9px;letter-spacing:2px;color:var(--ash);margin-bottom:4px;margin-top:10px}
.modal textarea,.modal select{width:100%;background:var(--iron);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--bone);font-family:Barlow,sans-serif;outline:none}
.modal textarea:focus,.modal select:focus{border-color:var(--fire)}
.modal textarea{resize:vertical;min-height:64px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns button{flex:1;padding:7px;font-size:10px;font-family:Space Mono,monospace;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--ash);letter-spacing:1px}
.modal-btns button.save{background:var(--fire);border-color:var(--fire);color:#000}
.add-area{margin-top:4px}
.add-btn-col{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:7px;font-size:10px;font-family:Space Mono,monospace;color:var(--ash);cursor:pointer;letter-spacing:1px}
.add-btn-col:hover{border-color:var(--fire);color:var(--fire)}
.add-form{display:none;margin-top:7px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.add-form textarea{width:100%;background:var(--iron);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;color:var(--bone);font-family:Barlow,sans-serif;resize:none;margin-bottom:6px;outline:none}
.add-form select{width:100%;background:var(--iron);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;color:var(--bone);margin-bottom:6px;outline:none}
.add-form-btns{display:flex;gap:6px}
.add-form-btns button{flex:1;padding:5px;font-size:10px;font-family:Space Mono,monospace;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--ash);letter-spacing:1px}
.add-form-btns button.save{background:var(--fire);border-color:var(--fire);color:#000}
.empty{text-align:center;color:var(--ash);font-size:10px;padding:20px 0;font-family:Space Mono,monospace;letter-spacing:1px}
@media(max-width:900px){.board{grid-template-columns:repeat(6,minmax(160px,1fr))}}
@media(max-width:520px){.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <a href="/hub" style="font-family:Space Mono,monospace;font-size:9px;color:var(--ash);letter-spacing:1px;text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;transition:all .15s" onmouseover="this.style.borderColor='var(--fire)';this.style.color='var(--fire)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--ash)'">← HUB</a><div class="logo">ONE MAN <span>ARMY</span> - PMO</div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span><span class="dot"></span><span style="font-family:Space Mono,monospace;font-size:9px;color:var(--ash);letter-spacing:1px">LANCAMENTO 02/04/2026</span></span>
    <button class="btn" onclick="syncCards()">SYNC</button> <button class="btn" onclick="resetBoard()">RESET</button>
  </div>
</header>
<div class="stats">

<div class="toolbar">
  <button class="filter active" onclick="setF(this,'all')">TODOS</button>

  <button class="filter" onclick="setF(this,'legal')">LEGAL</button>

    <button class="filter" onclick="setF(this,'fabio')">FABIO</button>

    <button class="filter" onclick="setF(this,'claude')">CLAUDE</button>
    <button class="filter" onclick="setF(this,'flavia')">FLÁVIA</button>
    <button class="filter" onclick="setF(this,'bia')">BIA</button>

</div>

</div>

    <label>ENTREGÁVEL</label><textarea id="edit-entregavel" rows="2" placeholder="O que precisa ser entregue?"></textarea>

    <label>URL / REFERÊNCIA</label><input id="edit-url-ref" type="text" placeholder="Link de contexto" style="width:100%;background:var(--iron);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--bone);font-family:Barlow,sans-serif;margin-bottom:8px">

    <div class="modal-btns"><button onclick="closeModal()">CANCELAR</button><button class="save" onclick="saveEdit()">SALVAR</button></div>
  </div>

<script>
var cards = [];
var PMO_API = "https://api.onemanarmyproject.com.br";
var PMO_KEY = "354496182871fba394e09cfbb8d699f1bc6859f4e3417f84b0993ee36bcd0273";
var PMO_HDR = {"Content-Type":"application/json","x-api-key":"354496182871fba394e09cfbb8d699f1bc6859f4e3417f84b0993ee36bcd0273"};
var dragging = null;
var filt = "all";
var editId = null;
var RLABELS = {fabio:"Fabio",george:"George",flavia:"Flavia",bia:"Bia",tiago:"Tiago",darwin:"Darwin"};
var PICONS = {alta:"! ",media:"~ ",baixa:"- "};

function save(){} // migrado para API Hetzner


function syncCards(){ load(); }

function load(){
  fetch(PMO_API+"/pmo",{headers:{"x-api-key":PMO_KEY}})
    .then(function(r){return r.json();})
    .then(function(data){
      cards=Array.isArray(data)?data:[];
      render();
      // Enrich cards that have activity (started_at or completed_at) with execution_log
      var active=cards.filter(function(c){return c.started_at||c.completed_at;});
      active.forEach(function(card){
        fetch(PMO_API+"/pmo/"+card.id+"/detail",{headers:{"x-api-key":PMO_KEY}})
          .then(function(r){return r.json();})
          .then(function(detail){
            if(detail.execution_log){
              var idx=cards.findIndex(function(c){return c.id===card.id;});
              if(idx>=0){cards[idx].execution_log=detail.execution_log;render();}
            }
          }).catch(function(){});
      });
    })
    .catch(function(e){
      console.error("PMO API erro",e);
      fetch("/pmo-data.json").then(function(r){return r.json();}).then(function(d){cards=d.slice();render();});
    });
}

function mf(c){
  if(filt==="all") return true;
  var areas = ["site","infra","conteudo","legal","produto","operacao","comercial"];
  if(areas.indexOf(filt)>=0) return c.area===filt;
  return c.resp===filt;
}

function render(){
  var cols = ["back","todo","doing","review","approved","done","recorrente"];
  for(var ci=0;ci<cols.length;ci++){
    var col = cols[ci];
    var all = cards.filter(function(c){
      if(col==='recorrente') return c.permanent && c.col!=='done';
      if(c.permanent && c.col!=='done') return false;
      return c.col===col;
    });
    var vis = all.filter(mf);
    document.getElementById("cnt-"+col).textContent = all.length;
    var html = "";
    for(var i=0;i<vis.length;i++){
      var c = vis[i];
      var pClass = c.prio ? "prio-"+c.prio : "";
      var respBadge = c.resp ? '<span class="badge resp-'+c.resp+'">'+(RLABELS[c.resp]||c.resp)+"</span>" : "";
      var prioTxt = c.prio ? (PICONS[c.prio]||"")+c.prio.toUpperCase() : "PRIO";
      var prioClass = "prio-btn"+(c.prio?" "+c.prio:"");
      var btns = "";
      if(col==="back") btns += '<button class="ca" onclick="mv(\''+c.id+'\',\'todo\')">sprint</button>';
      if(col==="todo") btns += '<button class="ca" onclick="mv(\''+c.id+'\',\'doing\')">iniciar</button>';
      if(col==="doing") btns += '<button class="ca" onclick="mv(\''+c.id+'\',\'review\')">review</button>';
      if(col==="review") btns += '<button class="ca g" onclick="mv(\''+c.id+'\',\'approved\')">aprovar</button>';
      if(col==="approved") btns += '<button class="ca g" onclick="mv(\''+c.id+'\',\'done\')">feito</button>';
      if(col==="done") btns += '<button class="ca" onclick="mv(\''+c.id+'\',\'todo\')">reabrir</button>';
      btns += '<button class="ca" onclick="oe(\''+c.id+'\')">editar</button>';
      btns += '<button class="ca r" onclick="rm(\''+c.id+'\')">x</button>';
      btns += '<div class="mv-grp"><button class="mv" onclick="mup(\''+c.id+'\',\''+col+'\')">^</button><button class="mv" onclick="mdn(\''+c.id+'\',\''+col+'\')">v</button></div>';
      html += '<div class="card '+pClass+'" draggable="true" data-id="'+c.id+'" ondragstart="ds(event,\''+c.id+'\')" ondragend="de()">';
      html += '<div class="card-top"><div class="card-badges"><span class="badge badge-area">'+c.area+"</span>"+respBadge+'</div><button class="'+prioClass+'" onclick="cp(\''+c.id+'\',event)">'+prioTxt+"</button></div>";
      html += '<div class="card-text">'+c.text+"</div>";
      if(c.prazo||c.entregavel){
        html += '<div style="margin-bottom:6px;display:flex;flex-direction:column;gap:3px">';
        if(c.prazo){
          var hoje = new Date().toISOString().split("T")[0];
          var atrasado = c.prazo < hoje && c.col !== "done";
          var corPrazo = atrasado ? "var(--red)" : "var(--yellow)";
          html += '<div style="font-family:Space Mono,monospace;font-size:9px;color:'+corPrazo+'">📅 '+c.prazo+"</div>";
        }
        if(c.entregavel) html += '<div style="font-family:Space Mono,monospace;font-size:9px;color:var(--ash);font-style:italic">⬡ '+c.entregavel+"</div>";
        html += "</div>";
      }
      // Execution log tags
      if(c.execution_log){
        var logs = c.execution_log.split('\n').filter(function(l){return l.trim();});
        if(logs.length){
          html += '<div class="card-tags">';
          logs.slice(-3).forEach(function(log){
            var m = log.match(/\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (\w+)\] (\w+): (.+)/);
            if(m){
              var date = m[1].slice(5,16).replace('-','/');
              var agent = m[2];
              var action = m[3];
              var detail = m[4].slice(0,60);
              var actionColor = action==='STARTED'?'var(--blue)':action==='COMPLETED'?'var(--green)':'var(--yellow)';
              html += '<div class="tag-line"><span class="tag-time">'+date+'</span><span class="tag-agent" style="color:'+actionColor+'">'+agent+'</span><span class="tag-action">'+action+'</span><span class="tag-detail">'+detail+'</span></div>';
            }
          });
          html += '</div>';
        }
      }
      html += '<div class="card-actions">'+btns+"</div></div>";
    }
    document.getElementById("cards-"+col).innerHTML = html;
    document.getElementById("emp-"+col).style.display = vis.length ? "none" : "block";
  }
  var done = cards.filter(function(c){return c.col==="done";}).length;
  var tot = cards.length;
  var pct = tot ? Math.round(done/tot*100) : 0;
  document.getElementById("s-back").textContent = cards.filter(function(c){return c.col==="back";}).length;
  document.getElementById("s-todo").textContent = cards.filter(function(c){return c.col==="todo";}).length;
  document.getElementById("s-doing").textContent = cards.filter(function(c){return c.col==="doing";}).length;
  document.getElementById("s-done").textContent = done;
  document.getElementById("pct-fill").style.width = pct+"%";
  document.getElementById("pct-label").textContent = pct+"% completo";
}

function cp(id,e){
  e.stopPropagation();
  var c = cards.find(function(x){return x.id===id;});
  if(!c) return;
  var cy = ["","alta","media","baixa"];
  c.prio = cy[(cy.indexOf(c.prio||"")+1)%cy.length];
  fetch(PMO_API+"/pmo/"+c.id,{method:"PATCH",headers:PMO_HDR,body:JSON.stringify(c)}); render();
}
function ds(e,id){
  dragging = id;
  var el = document.querySelector("[data-id=\""+id+"\"]");
  if(el) setTimeout(function(){el.classList.add("dragging");},0);
}
function de(){
  document.querySelectorAll(".card").forEach(function(c){c.classList.remove("dragging");});
  document.querySelectorAll(".col").forEach(function(c){c.classList.remove("drag-over");});
}
function ov(e){ e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function dp(e,col){
  e.preventDefault();
  document.querySelectorAll(".col").forEach(function(c){c.classList.remove("drag-over");});
  if(!dragging) return;
  var c = cards.find(function(x){return x.id===dragging;});
  if(c){ c.col=col; fetch(PMO_API+"/pmo/"+id,{method:"PATCH",headers:PMO_HDR,body:JSON.stringify(c)}); render(); }
  dragging = null;
}
function mv(id,col){
  var c = cards.find(function(x){return x.id===id;});
  if(c){ c.col=col; fetch(PMO_API+"/pmo/"+id,{method:"PATCH",headers:PMO_HDR,body:JSON.stringify(c)}); render(); }
}
function mup(id,col){
  var g = cards.filter(function(c){return c.col===col;});
  var gi = g.findIndex(function(c){return c.id===id;});
  if(gi<=0) return;
  var a = cards.findIndex(function(c){return c.id===id;});
  var b = cards.findIndex(function(c){return c.id===g[gi-1].id;});
  var t = cards[a]; cards[a] = cards[b]; cards[b] = t;
  save(); render();
}
function mdn(id,col){
  var g = cards.filter(function(c){return c.col===col;});
  var gi = g.findIndex(function(c){return c.id===id;});
  if(gi>=g.length-1) return;
  var a = cards.findIndex(function(c){return c.id===id;});
  var b = cards.findIndex(function(c){return c.id===g[gi+1].id;});
  var t = cards[a]; cards[a] = cards[b]; cards[b] = t;
  save(); render();
}
function rm(id){
  if(!confirm("Remover?")) return;
  cards = cards.filter(function(x){return x.id!==id;});
  fetch(PMO_API+"/pmo/"+id,{method:"DELETE",headers:PMO_HDR}); render();
}
function setF(btn,area){
  filt = area;
  document.querySelectorAll(".filter").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  render();
}
var newCardCol = 'todo';
function openAdd(col){
  newCardCol = col;
  editId = '__new__';
  document.getElementById("edit-text").value = "";
  document.getElementById("edit-area").value = "operacao";
  document.getElementById("edit-resp").value = "";
  document.getElementById("edit-prio").value = "media";
  document.getElementById("edit-prazo").value = "";
  document.getElementById("edit-entregavel").value = "";
  document.getElementById("edit-done-criteria").value = "";
  document.getElementById("edit-context-min").value = "";
  document.getElementById("edit-url-ref").value = "";
  document.getElementById("edit-autonomy").value = "supervised";
  document.getElementById("edit-permanent").checked = false;
  document.getElementById("modal-bg").classList.add("open");
  setTimeout(function(){ document.getElementById("edit-text").focus(); }, 100);
}
function cancelAdd(col){
  document.getElementById("addf-"+col).style.display = "none";
  document.getElementById("addbtn-"+col).style.display = "block";
}
function addCard(col){}
function oe(id){
  var c = cards.find(function(x){return x.id===id;});
  if(!c) return;
  editId = id;
  document.getElementById("edit-text").value = c.text;
  document.getElementById("edit-area").value = c.area;
  document.getElementById("edit-resp").value = c.resp||"";
  document.getElementById("edit-prio").value = c.prio||"";
  document.getElementById("edit-prazo").value = c.prazo||"";
  document.getElementById("edit-entregavel").value = c.entregavel||"";
  document.getElementById("edit-done-criteria").value = c.done_criteria||"";
  document.getElementById("edit-context-min").value = c.context_min||"";
  document.getElementById("edit-url-ref").value = c.url_ref||"";
  document.getElementById("edit-autonomy").value = c.autonomy_level||"full";
  document.getElementById("edit-permanent").checked = c.permanent==1;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(){ document.getElementById("modal-bg").classList.remove("open"); }
function saveEdit(){
  if (editId === '__new__') {
    var t = document.getElementById("edit-text").value.trim();
    if (!t) return;
    var nc = {
      id: Date.now().toString(),
      col: newCardCol,
      text: t,
      area: document.getElementById("edit-area").value,
      resp: document.getElementById("edit-resp").value,
      prio: document.getElementById("edit-prio").value,
      prazo: document.getElementById("edit-prazo").value,
      entregavel: document.getElementById("edit-entregavel").value,
      done_criteria: document.getElementById("edit-done-criteria").value,
      context_min: document.getElementById("edit-context-min").value,
      url_ref: document.getElementById("edit-url-ref").value,
      autonomy_level: document.getElementById("edit-autonomy").value,
      permanent: document.getElementById("edit-permanent").checked ? 1 : 0
    };
    cards.push(nc);
    fetch(PMO_API+"/pmo",{method:"POST",headers:PMO_HDR,body:JSON.stringify(nc)});
    render();
    document.getElementById("modal-bg").classList.remove("open");
    return;
  }
  var c = cards.find(function(x){return x.id===editId;});
  if(!c) return;
  c.text = document.getElementById("edit-text").value.trim()||c.text;
  c.area = document.getElementById("edit-area").value;
  c.resp = document.getElementById("edit-resp").value;
  c.prio = document.getElementById("edit-prio").value;
  c.prazo = document.getElementById("edit-prazo").value;
  c.entregavel = document.getElementById("edit-entregavel").value;
  c.done_criteria = document.getElementById("edit-done-criteria").value;
  c.context_min = document.getElementById("edit-context-min").value;
  c.url_ref = document.getElementById("edit-url-ref").value;
  c.autonomy_level = document.getElementById("edit-autonomy").value;
  c.permanent = document.getElementById("edit-permanent").checked ? 1 : 0;
  fetch(PMO_API+"/pmo/"+c.id,{method:"PATCH",headers:PMO_HDR,body:JSON.stringify(c)}); render();
  document.getElementById("modal-bg").classList.remove("open");
}

  if(!confirm("Resetar para os dados originais?")) return;
  load();
}
